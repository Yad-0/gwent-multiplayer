<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gwent Game</title>
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <div id="mainDiv">

        <div id="player2-hand">
            <h3 class="hand-title">P2 Hand</h3>
        </div>
        
        <div id="player2-discard" class="discardRow">
            <h3 class="discard-title">P2 Discarded</h3>
        </div>

        <div id="player2-side">
            
            <br><hr><br>
            <div id="board-2c">
                <h1>P2 Siege</h1>
            </div>
            <h4 id="board-2c-count" class="counter"></h4>
            <br><hr><br>
            <div id="board-2b">
                <h1>P2 Range</h1>
            </div>
            <h4 id="board-2b-count" class="counter"></h4>
           
            <br><hr><br>
            <div id="board-2a">
                <h1>P2 Combat</h1>
            </div>
            <h4 id="board-2a-count" class="counter"></h4>
           

        </div>

        <br><hr id="boardSeparation"><br>

        <div id="player1-side">

             <div id="board-1a">
                <h1>P1 Combat</h1>
            </div>
            <h4 id="board-1a-count" class="counter"></h4>
            <br><hr><br>
            <div id="board-1b">
                <h1>P1 Range</h1>
            </div>
            <h4 id="board-1b-count" class="counter"></h4>
    
            <br><hr><br>
            <div id="board-1c">
                <h1>P1 Siege</h1>
            </div>
            <h4 id="board-1c-count" class="counter"></h4>
            <br><hr><br>
            

        </div>

    </div>

    <div id="player1-discard" class="discardRow">
        <h3 class="discard-title">P1 Discarded</h3>
        
    </div>
    
    <div id="player1-hand">
        <h3 class="hand-title">P1 Hand</h3>
    </div>

    
 
    <script src="script.js"></script>
</body>
</html>
